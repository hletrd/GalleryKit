version: 2
updates:
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    labels:
      - dependencies

  - package-ecosystem: docker
    directory: /apps/web
    schedule:
      interval: weekly
    labels:
      - dependencies
