# Rate limiting zones (per-IP, shared memory)
limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=admin:10m rate=30r/m;
limit_conn_zone $binary_remote_addr zone=connlimit:10m;

# Preserve the trusted edge's scheme when this nginx instance is the internal
# HTTP hop behind a TLS-terminating load balancer. Fall back to this listener's
# scheme when the upstream header is absent or not an explicit http/https value.
map $http_x_forwarded_proto $gallerykit_forwarded_proto {
    default $scheme;
    ~*^https$ https;
    ~*^http$ http;
}

# Upstream with keepalive to avoid per-request TCP handshakes
upstream nextjs {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name gallery.atik.kr;

    # This file is intended to run behind a TLS-terminating edge/load balancer
    # that forwards HTTPS requests to this local HTTP listener. If nginx is the
    # public edge, add a separate 443 server block with certificates and redirect
    # cleartext 80 traffic before enabling HSTS in production.
    # Default to a small request body. Large admin upload/restore endpoints opt
    # into their own caps below, reducing pre-auth Server Action body exposure.
    client_max_body_size 2M;
    client_body_timeout 60s;
    send_timeout 30s;

    # Limit concurrent connections per IP
    limit_conn connlimit 20;

    server_tokens off;

    # Compression
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/html text/css application/javascript application/json image/svg+xml text/plain;
    gzip_vary on;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=(), browsing-topics=(), attribution-reporting=(), private-state-token-redemption=(), private-state-token-issuance=(), idle-detection=()" always;
    # CSP for proxied responses is set by Next.js (single source of truth).
    # Only the static image location below has its own tighter CSP.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    proxy_hide_header X-Powered-By;

    # Rate-limit POST to admin login page (both with and without locale prefix)
    location ~ ^(/[a-z]{2})?/admin$ {
        client_max_body_size 64K;
        limit_req zone=login burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $gallerykit_forwarded_proto;
    }

    # Keep restore bodies aligned with the app-level 250 MB cap instead of the
    # broader gallery upload allowance.
    location ~ ^(/[a-z]{2})?/admin/db {
        client_max_body_size 250M;
        limit_req zone=admin burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $gallerykit_forwarded_proto;
    }

    # Dashboard uploads allow the documented 200 MiB per-file cap plus form
    # overhead, while still staying far below the historical 2 GiB blanket cap.
    location ~ ^(/[a-z]{2})?/admin/dashboard {
        client_max_body_size 216M;
        limit_req zone=admin burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $gallerykit_forwarded_proto;
    }

    # Rate-limit admin mutation routes (category/tag/user/settings/seo changes)
    location ~ ^(/[a-z]{2})?/admin/(categories|tags|users|password|seo|settings) {
        client_max_body_size 2M;
        limit_req zone=admin burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $gallerykit_forwarded_proto;
    }

    # Admin API mutation routes bypass page-path regexes and need the same edge
    # throttle/body budget as form-backed admin mutations.
    location ^~ /api/admin/ {
        client_max_body_size 2M;
        limit_req zone=admin burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $gallerykit_forwarded_proto;
    }

    location ^~ /uploads/original/ {
        return 404;
    }

    # Serve uploaded images directly via nginx (sendfile) — avoids Node.js entirely.
    # Restricts to known format dirs (jpeg/webp/avif) and image extensions only.
    # Uses root + rewrite (not alias) for reliability with regex locations.
    location ~ ^(?:/[a-z]{2})?/uploads/(jpeg|webp|avif)/.+\.(?:jpe?g|webp|avif)$ {
        root /app/apps/web/public;
        # Strip optional locale prefix: /en/uploads/... → /uploads/...
        rewrite ^(?:/[a-z]{2})?(/uploads/.*)$ $1 break;

        expires 1y;
        add_header Cache-Control "public, immutable";
        # Repeat all security headers — nginx add_header does NOT inherit from parent block
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=(), browsing-topics=(), attribution-reporting=(), private-state-token-redemption=(), private-state-token-issuance=(), idle-detection=()" always;
        add_header Content-Security-Policy "default-src 'none'; img-src 'self'; style-src 'none'; script-src 'none';" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }

    location / {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "";  # Enable keepalive (empty = no close)
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $gallerykit_forwarded_proto;

        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
