# Rate limiting zone for login endpoint (10 requests/minute per IP, shared 10MB zone)
limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;

server {
    listen 80;
    server_name gallery.atik.kr;

    client_max_body_size 250M;

    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    proxy_hide_header X-Powered-By;

    # Rate-limit POST to admin login page (both with and without locale prefix)
    # Next.js server actions POST to the page URL itself, not a /login subpath
    location ~ ^(/[a-z]{2})?/admin$ {
        limit_req zone=login burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve uploaded images directly via nginx (sendfile) — avoids Node.js entirely.
    # Restricts to known format dirs (jpeg/webp/avif) and image extensions only.
    # Uses root + rewrite (not alias) for reliability with regex locations.
    location ~ ^(?:/[a-z]{2})?/uploads/(jpeg|webp|avif)/.+\.(?:jpe?g|webp|avif|png)$ {
        root /app/apps/web/public;
        # Strip optional locale prefix: /en/uploads/... → /uploads/...
        rewrite ^(?:/[a-z]{2})?(/uploads/.*)$ $1 break;

        expires 1y;
        add_header Cache-Control "public, immutable";
        # Repeat all security headers — nginx add_header does NOT inherit from parent block
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'none'; img-src 'self'; style-src 'none'; script-src 'none';" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
