services:

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    container_name: gallerykit-web
    restart: always
    # Use bridge networking with localhost-only binding so all external traffic
    # goes through nginx (which applies rate limiting + security headers).
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env.local

    volumes:
      - ./data:/app/data
      - ./public:/app/apps/web/public
