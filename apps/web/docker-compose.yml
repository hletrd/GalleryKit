services:

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    container_name: gallerykit-web
    restart: always
    # Use host networking so the container can reach MySQL on 127.0.0.1.
    # Nginx reverse proxy on the host handles rate limiting and security headers.
    network_mode: host
    env_file:
      - .env.local
    # Explicit environment takes precedence over env_file — pin the bind so a
    # stray HOSTNAME in .env.local can't expose :3000 to the host network and
    # let clients bypass nginx rate limiting.
    environment:
      HOSTNAME: "127.0.0.1"

    volumes:
      - ./data:/app/data
      - ./public:/app/apps/web/public
